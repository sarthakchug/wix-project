<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navbar</title>
    <style>

        .header{
            width:100%;
            border: 1px solid black;

        }


                                           /* image style section start from here */
        .navImg{
            /* border: 1px solid red; */
            /* display: inline; never use this in your life */
            display: inline-block;
            width: 15%;
            /* position: relative;
            top: 10px;
            left: 10px; */

        }

        
                                        /* nav content style section start from here  */ 
        .navContent{
        /* border: 1px solid black; */
        /* display: inline; */
        display: inline-block;
      }

        .navContent>ul{
            list-style-type: none;
            display: inline-block;
            margin: 0px;
            padding: 0px;
      }

        .navContent>ul>li{
            display: inline-block;
            color: #003376;
            font-size: 20px;
            font-weight: 500;
            padding: 20px;
      }

        .midClass{
            display: inline-block;
            /* border: 1px solid red; */
            width: 33%;
      }

    </style>
</head>
<body>
    <div class="header">
      
      <div class="navImg">
           <img src="./photos/logo.png" alt="logo image" width="130px" height="40px">
      </div>

      <div class="midClass"></div>


      <div class="navContent">
        <ul>
            <li>Home</li>
            <li>About Us</li>
            <li>Courses</li>
            <li>Carrer</li>
            <li>More</li>
            <li>Contact Us</li>
        </ul>
      </div>

    </div>
</body>
</html>
