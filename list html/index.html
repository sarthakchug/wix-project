<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list in html</title>
</head>
<body>
                                                 <!-- unordered list -->
    <ul style="list-style-type: none;">
        <li>milk</li>
        <li>coffee</li>
        <li>chaypatti</li>
        <li>sugar</li>
    </ul>
                                                  <!-- ordered list -->
    <ol type="A">
        <li>milk</li>
        <li>coffee</li>
        <li>chaypatti</li>
        <li>sugar</li>
    </ol>
    
</body>
</html>
