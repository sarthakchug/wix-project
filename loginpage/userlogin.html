<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register</title>
    <style>
        body{
            border: 2px solid;
            border-radius: 9%;
            width: 20%;
            padding-bottom: 30px;
            margin-left: 38%;
        }
        h1{
            display: flex;
            justify-content: center;
        }
        .usersection{
            display: flex;
            align-items: center;
        }
        .usersection>input{
           padding: 10px;
           font-size: medium;
           background-color:black;
           color: white;
        }
        .usersection>label>img{
            width: 58px;
        }
        .extrainfo{
            display: flex;
            justify-content: space-evenly;
            font-size: 13px;
        }
        .signsection{
            display: flex;
            justify-content: center;
        }
        .signsection>input{
           padding: 15px 0px 5px 81px;
           margin: 17px 17px 0px 17px;
           background-color: white;
        }

    </style>
</head>
<body>
    <h1>LOG IN PAGE</h1>

    <div class="maindiv">

        <div class="usersection">
            
            <label for="name"><img src="https://static.vecteezy.com/system/resources/previews/021/919/677/original/login-icon-in-trendy-flat-style-isolated-on-white-background-approach-symbol-for-your-web-site-design-logo-app-ui-illustration-eps10-flat-style-for-graphic-design-vector.jpg" alt="user" width="100%"></label>
            <input  type="name" value="Username"  id="name" name="username">

        </div>
        <div class="usersection">
            
            <label for="password"><img src="https://tse3.mm.bing.net/th/id/OIP.7brgm5QsB1_1evbf7eFczgHaHa?pid=Api&P=0&h=180" alt="lock" width="100%"></label>
            <input  type="password" value=".............."  id="password" name="username">
        </div>

        <div class="extrainfo">
            <span>Remember Me</span>
            <span>Forget Password?</span>
        </div>

        <div class="signsection">
            <input type="login" value="LOGIN" name="login id">
        </div>
        <div class="signsection">
            <input type="register" value="REGISTER" name="login id">
        </div>

    </div>
    
</body>
</html>
