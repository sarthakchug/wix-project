<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hnb navbar</title>
    <style>
      .mainheader {
        /* display:inline-block; */
        width: 100%;
        border: 1px solid black;
      }

      /* nav image style section start from here  */

      .navlogoimg {
        display: inline-block;
        /* border: 1px solid red; */
        width: 92px;
        height: 92px;
      }

      .navflagimage {
        display: inline-block;
        /* border: 1px solid blue; */
        width: 136px;
        height: 92px;
      }

      .nav50image {
        display: inline-block;
        /* border: 1px solid brown; */
        width: 158px;
        height: 121px;
      }

      /* nav content style section start from here  */

      .navemptyspace {
        /* border: 10px solid yellow; */
        display: inline-block;
        width: 11%;
      }

      .navlogotext {
        display: inline-block;
        margin: 0px;
        padding: 0px;
      }

      .navlogotext > h1 {
        font-size: 20px;
        margin: auto;
        padding: 0px 0px 0px 81px;
      }

      .navlogotext > p {
        font-weight: bold;
        font-size: 20px;
        margin: 0;
        padding: 6px 0px 12px 0px;
      }

      /* navwrapicon style section start from here */

      .navwrapicon {
        background-color: #008336;
        border: 1px solid green;
        width: 100%;
      }

      .navwrapicon > p {
        /* border: 1px solid black; */
        text-align: center;
      }

      .navwrapicon > p > span {
        font-size: 17px;
        padding: 16px 20px;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="mainheader">
      <div class="navemptyspace"></div>

      <div class="navlogoimg">
        <img
          src="./photos/HNBG-new-logo.png"
          alt="logo image"
          width="100%"
          height="100%"
        />
      </div>

      <div class="navflagimage">
        <img
          src="./photos/flag.png"
          alt="hosting flag"
          width="100%"
          height="100%"
        />
      </div>

      <div class="navlogotext">
        <h1>
          हेमवती नंदन बहुगुणा गढ़वाल विश्वविद्यालय(केंद्रीय विश्वविद्यालय)
        </h1>
        <!-- <h1>HEMAVATI NANDAN BAHUGUNA GARHWAL UNIVERSITY( A Central University )</h1> -->
        <p>
          HEMAVATI NANDAN BAHUGUNA GARHWAL UNIVERSITY( A Central University )
        </p>
      </div>

      <div class="nav50image">
        <img
          src="./photos/logo_6.jpg"
          alt="golden jubilee"
          width="100%"
          height="100%"
        />
      </div>
    </div>

    <div class="navwrapicon">
      <p>
        <span>University</span>
        <span>Administration</span>
        <span>Statutory Bodies</span>
        <span>Schools</span>
        <span>Academic</span>
        <span>Central Facilities</span>
        <span>Admission</span>
        <span>Examination</span>
        <span>Download</span>
      </p>
    </div>
  </body>
</html>
