<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nav bar</title>
    <style>
       
       .main-header{
            width: 100%;
            height:130px;
            border: 1px solid black;
        }

                                            /* image style section start from here  */
        .nav-logo-image{
            /* border: 1px solid red; */
            display: inline-block;
            width: 7%;
            position:relative;
            top: 15px;
            /* vertical-align: middle; */

        }

        .nav-flag-image{
            /* border: 1px solid blue; */
            display: inline-block;
            width: 132px;
            height: 88px;
        }

        .nav-50logo-image{
            /* border: 1px solid gold; */
            display: inline-block;
            padding-left:80%;
            position: relative;
            bottom:175px;
            /* left:80% ; */
        }
        
                                           /* nav content style section start from here */

        .empty{
            display: inline-block;
            width: 8%;
        }

        .header-logo-text>h1>strong{
            /* border: 1px solid hotpink; */
            display: inline-block;
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin: 0px;
            padding-left:250px;
            position: relative;
            bottom: 79px;
        }

        .header-logo-text>h2{
            /* border: 1px solid brown; */
            display: inline-block;
            font-size: 18px;
            font-weight:800;
            color:#333;
            margin: 0px;
            padding-left: 240px;
            position: relative;
            bottom: 102px;
        }

        .nav-content{
          /* border: 1px solid black; */
          background: #008336;
          position: relative;
          bottom:179px;
          display:inline-block;
          padding-right:662px;
        }

        .nav-content>ul{
          display: inline-block;
          position: relative;
          left: 30%;
          margin:2px;
        }

        
        .nav-content>ul>li{
          border: 1px solid rgb(8, 193, 35);
          list-style-type: none;
          display: inline-block;
          font-size: 18px;
          color:white;
          padding: 13px 5px;
          margin: -2px;
        }
    </style>
  </head>
  <body>
    
    <div class="main-header">


    <div class="empty"></div>


    <div class="nav-logo-image">
      <img src="./photos/HNBG-new-logo.png" alt="logo image" width="89px" height="90px" />
    </div>


    <div class="nav-flag-image">
      <img src="./photos/flag.png" alt="flag image" width="100%" height="100%"/>
    </div>


    <div class="header-logo-text">
      <h1>
        <strong>&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;
          &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; हेमवती
          नंदन बहुगुणा गढ़वाल विश्वविद्यालय(केंद्रीय विश्वविद्यालय)</strong>
      </h1>

      <h2>
        &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;
        &nbsp; &nbsp; &nbsp; &nbsp;HEMVATI NANDAN BAHUGUNA GARHWAL UNIVERSITY( A
        Central University )
      </h2>
    </div>

    <div class="nav-50logo-image">
        <img src="./photos/logo_6.jpg" alt="vande matram" width="170px" height="110px">
    </div>
    <div class="nav-content">
        <ul>
            <li>University</li>
            <li>Administration</li>
            <li>statutary Bodies</li>
            <li>Schools</li>
            <li>Academic</li>
            <li>Central Facilities</li>
            <li>Admission</li>
            <li>Examination</li>
        </ul>
    </div>

    </div>
  </body>
</html>
